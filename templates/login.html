<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PCP Metalúrgico - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="logo-placeholder">⚙️ PCP METALÚRGICO</div>
        
        <h3>Acesso do Aluno / Grupo</h3>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="usuario">Usuário / Equipe:</label>
                <input type="text" id="usuario" name="usuario" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Entrar no Sistema</button>
        </form>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">

        <h3>Solicitar Novo Acesso</h3>
        <form action="/cadastrar_usuario" method="POST">
            <div class="form-group">
                <label for="reg_usuario">Nome do Grupo/Aluno:</label>
                <input type="text" id="reg_usuario" name="usuario" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="reg_senha">Defina uma Senha:</label>
                <input type="password" id="reg_senha" name="senha" required>
            </div>
            <button type="submit" class="btn btn-success" style="width:100%;">Solicitar Cadastro</button>
        </form>
    </div>
</body>
</html>
